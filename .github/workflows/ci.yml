name: CI

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/ci.yml
      - grammar.js
      - src/**
      - test/**
      - examples/**/*.tag
      - queries/**
      - bindings/**
      - binding.gyp
      - tree-sitter.json
      - package.json
      - Cargo.toml
      - go.mod
      - pyproject.toml
      - Package.swift
  pull_request:
    branches: [master]
    paths:
      - .github/workflows/ci.yml
      - grammar.js
      - src/**
      - test/**
      - examples/**/*.tag
      - queries/**
      - bindings/**
      - binding.gyp
      - tree-sitter.json
      - package.json
      - Cargo.toml
      - go.mod
      - pyproject.toml
      - Package.swift
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test:
    name: Test parser
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v3
        with:
          test-rust: true
          test-node: true
          test-python: true
          test-go: true
          test-swift: true
      - name: Parse examples
        uses: tree-sitter/parse-action@v4
        with:
          files: examples/*.tag
      - name: Validate queries
        if: runner.os == 'Linux'
        run: |
          tree-sitter query -q -p . queries/riot_v3/highlights.scm examples/basic.tag
          tree-sitter query -q -p . queries/riot_v3/injections.scm examples/basic.tag
          tree-sitter query -q -p . queries/riot_v3/folds.scm examples/basic.tag
