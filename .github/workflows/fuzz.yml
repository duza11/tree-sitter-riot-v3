name: Fuzz parser

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/fuzz.yml
      - grammar.js
      - src/parser.c
      - src/scanner.c
  pull_request:
    branches: [master]
    paths:
      - .github/workflows/fuzz.yml
      - grammar.js
      - src/parser.c
      - src/scanner.c
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Run fuzzer
        uses: tree-sitter/fuzz-action@v4
