name: Lint

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/lint.yml
      - eslint.config.mjs
      - grammar.js
      - package.json
      - package-lock.json
  pull_request:
    branches: [master]
    paths:
      - .github/workflows/lint.yml
      - eslint.config.mjs
      - grammar.js
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          cache: npm
          node-version: 22
      - name: Install modules
        run: npm ci --legacy-peer-deps
      - name: Run ESLint
        run: npm run lint
